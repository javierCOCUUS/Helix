# Helix - Klipper base config (cold dual-mass process)
# Target: BTT Manta M8P V2.0 + 2x external DM860T + alginate valve servo
# Date: 2026-03-12

# IMPORTANT:
# - Replace all <PLACEHOLDER> values before first power-on.
# - Validate pin names against the official Manta M8P pinout for your MCU.
# - This template avoids [extruder]/heater objects by design (no temperature loop).
# - Material feeders are modeled as manual steppers.

[mcu]
serial: <MCU_SERIAL_PATH>
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 2500
max_z_velocity: 30
max_z_accel: 300
square_corner_velocity: 5.0

# ------------------------
# X / Y / Z AXES (sample)
# ------------------------
[stepper_x]
step_pin: <X_STEP_PIN>
dir_pin: <X_DIR_PIN>
enable_pin: !<X_EN_PIN>
microsteps: 16
rotation_distance: <X_ROT_DIST>
endstop_pin: ^<X_ENDSTOP_PIN>
position_endstop: 0
position_max: <X_MAX>
homing_speed: 50

[stepper_y]
step_pin: <Y_STEP_PIN>
dir_pin: <Y_DIR_PIN>
enable_pin: !<Y_EN_PIN>
microsteps: 16
rotation_distance: <Y_ROT_DIST>
endstop_pin: ^<Y_ENDSTOP_PIN>
position_endstop: 0
position_max: <Y_MAX>
homing_speed: 50

[stepper_z]
step_pin: <Z_STEP_PIN>
dir_pin: <Z_DIR_PIN>
enable_pin: !<Z_EN_PIN>
microsteps: 16
rotation_distance: <Z_ROT_DIST>
endstop_pin: ^<Z_ENDSTOP_PIN>
position_endstop: 0
position_max: <Z_MAX>
homing_speed: 12

# ------------------------
# MATERIAL FEEDER A - DM860T #1
# ------------------------
[manual_stepper feeder_a]
# Manta STEP/DIR/EN -> DM860T PUL-/DIR-/ENA-
# DM860T PUL+/DIR+/ENA+ -> +5V reference
step_pin: <E0_STEP_PIN>
dir_pin: <E0_DIR_PIN>
enable_pin: !<E0_EN_PIN>

# DM860T DIP target:
# - 1600 pulses/rev => microsteps: 8
# - 3200 pulses/rev => microsteps: 16
microsteps: 8
full_steps_per_rotation: 200
step_pulse_duration: 0.000004

# Screw feeder formula:
# rotation_distance = screw_pitch_mm / gear_ratio
rotation_distance: <E0_ROT_DIST>

# Travel limits in feeder-space (virtual)
position_min: 0
position_max: 999999
velocity: 20
accel: 200

# ------------------------
# MATERIAL FEEDER B - DM860T #2
# ------------------------
[manual_stepper feeder_b]
step_pin: <E1_STEP_PIN>
dir_pin: <E1_DIR_PIN>
enable_pin: !<E1_EN_PIN>
microsteps: 8
full_steps_per_rotation: 200
step_pulse_duration: 0.000004
rotation_distance: <E1_ROT_DIST>
position_min: 0
position_max: 999999
velocity: 20
accel: 200

# ------------------------
# ALGINATE VALVE SERVO
# ------------------------
[servo alginate_valve]
pin: <ALGINATE_SERVO_PIN>
minimum_pulse_width: 0.0005
maximum_pulse_width: 0.0025
maximum_servo_angle: 180

# ------------------------
# OPTIONAL FLOW SENSOR INPUT
# ------------------------
# Use this only if your selected sensor gives pulse output.
#[filament_motion_sensor flow_sensor_a]
#switch_pin: ^<FLOW_SENSOR_A_PIN>
#detection_length: 2.0
#pause_on_runout: False

# If using IO-Link, integrate through an external bridge.

# ------------------------
# HOMING / SAFETY
# ------------------------
[safe_z_home]
home_xy_position: <SAFE_HOME_X>,<SAFE_HOME_Y>
speed: 80
z_hop: 10
z_hop_speed: 10

[idle_timeout]
timeout: 1800

# ------------------------
# PROCESS MACROS
# ------------------------
[gcode_macro ALGINATE_ON]
gcode:
  SET_SERVO SERVO=alginate_valve ANGLE=<ALGINATE_OPEN_ANGLE>

[gcode_macro ALGINATE_OFF]
gcode:
  SET_SERVO SERVO=alginate_valve ANGLE=<ALGINATE_CLOSED_ANGLE>

[gcode_macro PRIME_A]
description: Prime feeder A at ambient temperature
gcode:
  MANUAL_STEPPER STEPPER=feeder_a ENABLE=1
  MANUAL_STEPPER STEPPER=feeder_a MOVE={params.LEN|default(10)|float} SPEED={params.SPEED|default(5)|float}

[gcode_macro PRIME_B]
description: Prime feeder B at ambient temperature
gcode:
  MANUAL_STEPPER STEPPER=feeder_b ENABLE=1
  MANUAL_STEPPER STEPPER=feeder_b MOVE={params.LEN|default(10)|float} SPEED={params.SPEED|default(5)|float}

[gcode_macro DEPOSIT_A_WITH_ALGINATE]
description: Co-deposit mass A while opening alginate valve
gcode:
  ALGINATE_ON
  MANUAL_STEPPER STEPPER=feeder_a ENABLE=1
  MANUAL_STEPPER STEPPER=feeder_a MOVE={params.LEN|default(5)|float} SPEED={params.SPEED|default(5)|float}
  ALGINATE_OFF

[gcode_macro DEPOSIT_B]
description: Deposit only mass B
gcode:
  MANUAL_STEPPER STEPPER=feeder_b ENABLE=1
  MANUAL_STEPPER STEPPER=feeder_b MOVE={params.LEN|default(5)|float} SPEED={params.SPEED|default(5)|float}

[gcode_macro FEEDERS_OFF]
gcode:
  MANUAL_STEPPER STEPPER=feeder_a ENABLE=0
  MANUAL_STEPPER STEPPER=feeder_b ENABLE=0

# ------------------------
# TUNING CHECKLIST
# ------------------------
# 1) Confirm feeder motor direction with short jogs.
# 2) Confirm ENA polarity (motor releases when disabled).
# 3) Calibrate rotation_distance with measured mass output.
# 4) Verify valve open/close angles without mechanical binding.
# 5) Add pressure/flow interlocks before production runs.
# 6) If fully synchronized XY+feed is required, add a host-side planner/bridge layer.
